<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nagar Setu — Sign Up</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Public+Sans:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --kraft:#DDD0AE;
  --kraft-dark:#C9B98C;
  --paper:#F7F3E9;
  --ink:#1F2A44;
  --ink-soft:#4A5570;
  --carbon:#34557A;
  --stamp-red:#9C3B2E;
  --line:#B8A97D;
}

*{box-sizing:border-box;}
body{
  margin:0;
  background:var(--kraft);
  background-image:
    linear-gradient(rgba(0,0,0,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,0.015) 1px, transparent 1px);
  background-size:24px 24px;
  color:var(--ink);
  font-family:'Public Sans', sans-serif;
  padding:60px 16px;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.signup-card{
  width:100%;
  max-width:420px;
  border:2px solid var(--ink);
  background:var(--paper);
  padding:32px 28px;
  box-shadow: 6px 6px 0px rgba(31, 42, 68, 0.15);
}

.letterhead-auth{
  text-align:center;
  margin-bottom:28px;
}
.letterhead-auth h1{
  font-family:'Special Elite', monospace;
  font-size:28px;
  margin:0 0 6px;
  letter-spacing:0.5px;
}
.letterhead-auth p{
  margin:0;
  font-size:12px;
  color:var(--ink-soft);
  text-transform:uppercase;
  letter-spacing:1px;
  font-weight:600;
}

.seal-auth{
  width:48px;height:48px;border-radius:50%;
  border:1.5px solid var(--carbon);
  display:flex;align-items:center;justify-content:center;
  font-family:'Special Elite', monospace;
  font-size:8px;color:var(--carbon);
  text-align:center;line-height:1.2;
  transform:rotate(-8deg);
  margin:0 auto 16px;
}

label{
  display:block;
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.5px;
  color:var(--ink-soft);
  margin:16px 0 6px;
}
input[type=text], input[type=password], input[type=email]{
  width:100%;
  border:1.5px solid var(--line);
  background:#fff;
  padding:10px 12px;
  font-family:'Public Sans', sans-serif;
  font-size:14px;
  border-radius:4px;
}
input:focus{outline:2px solid var(--carbon);outline-offset:1px;}

.btn-submit{
  width:100%;
  margin-top:24px;
  font-family:'Special Elite', monospace;
  font-size:14px;
  background:var(--ink);
  color:var(--paper);
  border:none;
  padding:12px;
  border-radius:4px;
  cursor:pointer;
}
.btn-submit:hover{background:var(--carbon);}

.error-msg{
  font-family:'IBM Plex Mono', monospace;
  font-size:12px;
  color:var(--stamp-red);
  border:1.5px solid var(--stamp-red);
  background:rgba(156, 59, 46, 0.05);
  padding:10px;
  border-radius:4px;
  margin-bottom:16px;
  font-weight:500;
}

.auth-footer{
  text-align:center;
  margin-top:20px;
  font-size:12px;
  color:var(--ink-soft);
}
.auth-footer a{
  color:var(--carbon);
  font-weight:700;
  text-decoration:none;
}
.auth-footer a:hover{
  text-decoration:underline;
}
</style>
</head>
<body>

<div class="signup-card">
  <div class="seal-auth">PUBLIC<br>WORKS</div>
  <div class="letterhead-auth">
    <h1>Nagar Setu</h1>
    <p>Citizen Sign Up</p>
  </div>

  <div class="error-msg" id="error-box" style="display:none;"></div>

  <form id="signup-form">
    {% csrf_token %}
    <label for="username">Username</label>
    <input type="text" id="username" placeholder="Choose a username" required>

    <label for="email">Email (Optional)</label>
    <input type="email" id="email" placeholder="Enter email address">

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Choose a password" required>

    <button type="submit" class="btn-submit">Register</button>
  </form>

  <div class="auth-footer">
    Already have an account? <a href="/login/">Sign In here</a>
  </div>
</div>

<script>
function getCookie(name) {
  let cookieValue = null;
  if (document.cookie && document.cookie !== '') {
    const cookies = document.cookie.split(';');
    for (let i = 0; i < cookies.length; i++) {
      const cookie = cookies[i].trim();
      if (cookie.substring(0, name.length + 1) === (name + '=')) {
        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
        break;
      }
    }
  }
  return cookieValue;
}

document.getElementById('signup-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('username').value;
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const errorBox = document.getElementById('error-box');

  errorBox.style.display = 'none';

  try {
    const res = await fetch('/api/signup/', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': getCookie('csrftoken')
      },
      body: JSON.stringify({ username, email, password })
    });
    const data = await res.json();
    if (res.ok && data.success) {
      window.location.href = '/';
    } else {
      errorBox.textContent = data.error || 'Registration failed.';
      errorBox.style.display = 'block';
    }
  } catch (err) {
    console.error(err);
    errorBox.textContent = 'Server connection failed.';
    errorBox.style.display = 'block';
  }
});
</script>

</body>
</html>
