<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nagar Setu — Labor Dashboard</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Public+Sans:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --kraft:#DDD0AE;
  --kraft-dark:#C9B98C;
  --paper:#F7F3E9;
  --ink:#1F2A44;
  --ink-soft:#4A5570;
  --carbon:#34557A;
  --stamp-red:#9C3B2E;
  --stamp-amber:#A6741E;
  --stamp-blue:#2F5C7A;
  --stamp-green:#3F6B3E;
  --line:#B8A97D;
}

*{box-sizing:border-box;}
body{
  margin:0;
  background:var(--kraft);
  background-image:
    linear-gradient(rgba(0,0,0,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,0.015) 1px, transparent 1px);
  background-size:24px 24px;
  color:var(--ink);
  font-family:'Public Sans', sans-serif;
  padding:28px 16px 60px;
}
.wrap{max-width:95%;margin:0 auto;padding:0 20px;}
.letterhead{
  border:2px solid var(--ink);
  background:var(--paper);
  padding:18px 24px;
  margin-bottom:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.letterhead h1{
  font-family:'Special Elite', monospace;
  font-size:26px;
  margin:0 0 4px;
}
.panel{
  border:2px solid var(--ink);
  background:var(--paper);
  padding:24px;
  min-height:400px;
}
.status-bar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom: 20px;
  padding-bottom: 10px;
  border-bottom: 1px dashed var(--line);
}
button {
  font-family:'Special Elite', monospace;
  font-size:14px;
  padding:10px 16px;
  background:var(--ink);
  color:var(--paper);
  border:none;
  cursor:pointer;
  border-radius:4px;
}
button:hover{background:var(--carbon);}
button.active {
  background: var(--stamp-green);
}
button.idle {
  background: var(--stamp-amber);
}
.issue-card {
  border: 1px solid var(--line);
  padding: 16px;
  margin-bottom: 16px;
  background: #fff;
}
.issue-card h3 {
  margin-top: 0;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="letterhead">
    <div>
      <h1>Nagar Setu - Field Worker Dashboard</h1>
      <p>Welcome, {{ request.user.username }}</p>
    </div>
    <a href="/logout/" style="color:var(--ink);font-weight:bold;">Log Out</a>
  </div>

  <div class="panel">
    <div class="status-bar">
      <div>
        <strong>Current Status: </strong><span id="current-status" style="text-transform:uppercase; font-weight:bold;">Loading...</span>
      </div>
      <div>
        <button id="toggle-status-btn" class="idle" style="display:none;">Start Working</button>
      </div>
    </div>
    
    <h2>Assigned Issues</h2>
    <div id="issues-list">Loading issues...</div>
  </div>
</div>

<script>
let watchId = null;
let currentStatus = 'idle';

function getCookie(name) {
  let cookieValue = null;
  if (document.cookie && document.cookie !== '') {
    const cookies = document.cookie.split(';');
    for (let i = 0; i < cookies.length; i++) {
      const cookie = cookies[i].trim();
      if (cookie.substring(0, name.length + 1) === (name + '=')) {
        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
        break;
      }
    }
  }
  return cookieValue;
}

const statusEl = document.getElementById('current-status');
const toggleBtn = document.getElementById('toggle-status-btn');

async function updateLocation(lat, lng) {
  try {
    await fetch('/api/labor/location/', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': getCookie('csrftoken')
      },
      body: JSON.stringify({ status: currentStatus, latitude: lat, longitude: lng })
    });
  } catch (err) {
    console.error("Location update failed", err);
  }
}

async function setStatus(newStatus) {
  try {
    const res = await fetch('/api/labor/location/', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': getCookie('csrftoken')
      },
      body: JSON.stringify({ status: newStatus })
    });
    const data = await res.json();
    if(res.ok && data.success) {
      currentStatus = data.status;
      statusEl.textContent = currentStatus;
      toggleBtn.style.display = 'block';
      if (currentStatus === 'working') {
        toggleBtn.textContent = 'Stop Working';
        toggleBtn.className = 'active';
        startTracking();
      } else {
        toggleBtn.textContent = 'Start Working';
        toggleBtn.className = 'idle';
        stopTracking();
      }
    }
  } catch(err) {
    console.error(err);
  }
}

function startTracking() {
  if (navigator.geolocation) {
    watchId = navigator.geolocation.watchPosition((position) => {
      updateLocation(position.coords.latitude, position.coords.longitude);
    }, (error) => {
      console.warn("Geolocation error", error);
    }, {
      enableHighAccuracy: true,
      maximumAge: 10000,
      timeout: 5000
    });
  } else {
    alert("Geolocation is not supported by this browser.");
  }
}

function stopTracking() {
  if (watchId !== null) {
    navigator.geolocation.clearWatch(watchId);
    watchId = null;
  }
}

toggleBtn.addEventListener('click', () => {
  setStatus(currentStatus === 'idle' ? 'working' : 'idle');
});

async function loadIssues() {
  try {
    const res = await fetch('/api/issues/');
    const data = await res.json();
    const myId = parseInt("{{ request.user.id }}", 10);
    const myIssues = data.issues.filter(i => i.assigned_labor_id === myId);
    
    const container = document.getElementById('issues-list');
    if (myIssues.length === 0) {
      container.innerHTML = '<p>No issues assigned to you currently.</p>';
      return;
    }
    container.innerHTML = myIssues.map(issue => `
      <div class="issue-card">
        <h3>${issue.title}</h3>
        <p><strong>Category:</strong> ${issue.category} | <strong>Status:</strong> ${issue.status}</p>
        <p>${issue.description}</p>
        <p><em>Lat: ${issue.latitude}, Lng: ${issue.longitude}</em></p>
        ${issue.status !== 'resolved' ? `
          <div style="margin-top:10px; padding: 10px; background: #f9f9f9; border: 1px solid #ccc; border-radius: 4px;">
            <label style="font-weight: bold; font-size: 12px; display: block; margin-bottom: 5px;">Upload Resolution Photo:</label>
            <input type="file" id="resolve-photo-${issue.id}" accept="image/*" style="margin-bottom: 10px;" />
            <br>
            <button onclick="resolveIssue(${issue.id})" style="background:var(--stamp-green);">Mark as Resolved</button>
          </div>
        ` : ''}
      </div>
    `).join('');
  } catch(err) {
    console.error(err);
    document.getElementById('issues-list').textContent = "Failed to load issues.";
  }
}

async function resolveIssue(id) {
  try {
    const fileInput = document.getElementById(`resolve-photo-${id}`);
    const file = fileInput ? fileInput.files[0] : null;

    const formData = new FormData();
    formData.append('status', 'resolved');
    if (file) {
      formData.append('resolved_photo', file);
    }

    const res = await fetch(`/api/issues/${id}/status/`, {
      method: 'POST',
      headers: {
        'X-CSRFToken': getCookie('csrftoken')
      },
      body: formData
    });
    const data = await res.json();
    if(res.ok && data.success) {
      loadIssues();
    } else {
      alert("Error: " + (data.error || "Failed to resolve issue."));
    }
  } catch(err) {
    console.error(err);
  }
}

// Initial fetch to ensure status is synced (just send idle to get state or stay the same if we fetch profile)
// For simplicity, just set to idle initially.
setStatus('idle');
loadIssues();
</script>
</body>
</html>
