<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nagar Setu — Field Worker Log In</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Public+Sans:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --kraft:#DDD0AE;
  --kraft-dark:#C9B98C;
  --paper:#F7F3E9;
  --ink:#1F2A44;
  --ink-soft:#4A5570;
  --carbon:#34557A;
  --stamp-red:#9C3B2E;
  --stamp-amber:#A6741E;
  --line:#B8A97D;
}

*{box-sizing:border-box;}
body{
  margin:0;
  background:var(--kraft);
  background-image:
    linear-gradient(rgba(0,0,0,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,0.015) 1px, transparent 1px);
  background-size:24px 24px;
  color:var(--ink);
  font-family:'Public Sans', sans-serif;
  padding:60px 16px;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.login-card{
  width:100%;
  max-width:420px;
  border:2px solid var(--ink);
  background:var(--paper);
  padding:32px 28px;
  box-shadow: 6px 6px 0px rgba(31, 42, 68, 0.15);
}

.letterhead-auth{
  text-align:center;
  margin-bottom:28px;
}
.letterhead-auth h1{
  font-family:'Special Elite', monospace;
  font-size:28px;
  margin:0 0 6px;
  letter-spacing:0.5px;
}
.letterhead-auth p{
  margin:0;
  font-size:12px;
  color:var(--ink-soft);
  text-transform:uppercase;
  letter-spacing:1px;
  font-weight:600;
}

.seal-auth{
  width:48px;height:48px;border-radius:50%;
  border:1.5px solid var(--stamp-amber);
  display:flex;align-items:center;justify-content:center;
  font-family:'Special Elite', monospace;
  font-size:8px;color:var(--stamp-amber);
  text-align:center;line-height:1.2;
  transform:rotate(5deg);
  margin:0 auto 16px;
}

label{
  display:block;
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.5px;
  color:var(--ink-soft);
  margin:16px 0 6px;
}
input[type=text], input[type=password]{
  width:100%;
  border:1.5px solid var(--line);
  background:#fff;
  padding:10px 12px;
  font-family:'Public Sans', sans-serif;
  font-size:14px;
  border-radius:4px;
}
input:focus{outline:2px solid var(--stamp-amber);outline-offset:1px;}

.btn-submit{
  width:100%;
  margin-top:24px;
  font-family:'Special Elite', monospace;
  font-size:14px;
  background:var(--stamp-amber);
  color:var(--paper);
  border:none;
  padding:12px;
  border-radius:4px;
  cursor:pointer;
}
.btn-submit:hover{background:var(--ink);}

.error-msg{
  font-family:'IBM Plex Mono', monospace;
  font-size:12px;
  color:var(--stamp-red);
  border:1.5px solid var(--stamp-red);
  background:rgba(156, 59, 46, 0.05);
  padding:10px;
  border-radius:4px;
  margin-bottom:16px;
  font-weight:500;
}

.auth-footer{
  text-align:center;
  margin-top:20px;
  font-size:12px;
  color:var(--ink-soft);
}
.auth-footer a{
  color:var(--carbon);
  font-weight:700;
  text-decoration:none;
  margin: 0 5px;
}
.auth-footer a:hover{
  text-decoration:underline;
}
</style>
</head>
<body>

<div class="login-card" style="border-color: var(--stamp-amber);">
  <div class="seal-auth">FIELD<br>WORK</div>
  <div class="letterhead-auth">
    <h1 style="color: var(--stamp-amber);">Labor Desk</h1>
    <p>Field Worker Login</p>
  </div>

  <div class="error-msg" id="error-box" style="display:none;"></div>

  <form id="labor-login-form">
    <label for="username">Username</label>
    <input type="text" id="username" placeholder="Enter worker username" required>

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter worker password" required>

    <button type="submit" class="btn-submit">Sign In to Dashboard</button>
  </form>

  <div class="auth-footer" style="margin-top: 24px; border-top: 1.5px dashed var(--line); padding-top: 20px;">
    Go to: <a href="/login/">Citizen Counter</a> | <a href="/login/admin/">Staff Desk</a>
  </div>
</div>

<script>
function getCookie(name) {
  let cookieValue = null;
  if (document.cookie && document.cookie !== '') {
    const cookies = document.cookie.split(';');
    for (let i = 0; i < cookies.length; i++) {
      const cookie = cookies[i].trim();
      if (cookie.substring(0, name.length + 1) === (name + '=')) {
        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
        break;
      }
    }
  }
  return cookieValue;
}

document.getElementById('labor-login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const errorBox = document.getElementById('error-box');

  errorBox.style.display = 'none';

  try {
    const res = await fetch('/api/login/', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': getCookie('csrftoken') || ''
      },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (res.ok && data.success) {
      if (data.user.is_labor) {
          window.location.href = '/labor/';
      } else {
          errorBox.textContent = 'Account is not configured as a field worker.';
          errorBox.style.display = 'block';
      }
    } else {
      errorBox.textContent = data.error || 'Worker authentication failed.';
      errorBox.style.display = 'block';
    }
  } catch (err) {
    console.error(err);
    errorBox.textContent = 'Server connection failed.';
    errorBox.style.display = 'block';
  }
});
</script>

</body>
</html>
